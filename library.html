<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자료실 — BDS Beyond Dream Scholars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="js/auth-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --crimson: #A51C30;
      --crimson-dark: #8a1828;
      --black: #1a1a1a;
      --gray-50: #f9f9f9;
      --gray-100: #f0f0f0;
      --gray-300: #d0d0d0;
      --gray-500: #888;
      --gray-700: #444;
      --white: #fff;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.10);
      --shadow-hover: 0 8px 40px rgba(0,0,0,.18);
    }

    body {
      font-family: 'Inter', 'Pretendard', sans-serif;
      background: var(--gray-50);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── 헤더 (ongdalsam 통일 스타일) ── */
    .header {
      background: var(--white);
      border-bottom: 1px solid #e0e0e0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      display: flex;
      flex-direction: column;
      gap: 2px;
      text-decoration: none;
    }
    .header-logo-main {
      font-family: 'Merriweather', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--crimson);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .header-logo-sub {
      font-size: 0.72rem;
      color: var(--black);
      font-weight: 400;
      letter-spacing: 0.5px;
    }
    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-nav a {
      color: var(--black);
      text-decoration: none;
      font-size: 0.88rem;
      padding: 8px 16px;
      border: 1px solid #e0e0e0;
      transition: all .2s;
    }
    .header-nav a:hover { background: var(--gray-50); border-color: var(--black); }
    .header-nav a.active { color: var(--crimson); border-color: var(--crimson); font-weight: 600; }
    .btn-logout {
      background: none;
      border: 1px solid #e0e0e0;
      color: var(--black);
      font-size: 0.88rem;
      padding: 7px 16px;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }
    .btn-logout:hover { background: var(--gray-50); border-color: var(--black); }

    /* ── 히어로 (사진 배경) ── */
    .hero {
      position: relative;
      min-height: 460px;
      background: linear-gradient(rgba(20,20,20,.48), rgba(20,20,20,.58)),
                  url('images/campus/study-hall-1.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      color: var(--white);
    }
    .hero-inner { max-width: 800px; }
    .hero-eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,.85);
      margin-bottom: 22px;
      font-weight: 500;
    }
    .hero h1 {
      font-family: 'Merriweather', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 400;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 22px;
    }
    .hero p {
      font-size: 1.05rem;
      line-height: 1.75;
      color: rgba(255,255,255,.9);
      max-width: 680px;
      margin: 0 auto;
      word-break: keep-all;
    }

    /* ── 본문 ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── 툴바 ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--black);
    }
    .toolbar-title span {
      font-size: 14px;
      font-weight: 400;
      color: var(--gray-500);
      margin-left: 8px;
    }
    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--crimson);
      color: var(--white);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
      font-family: inherit;
    }
    .btn-upload:hover { background: var(--crimson-dark); }

    /* ── 카드 그리드 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 28px;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .25s, box-shadow .25s;
      cursor: pointer;
      position: relative;
    }
    .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }

    /* 책 표지 영역 */
    .card-cover {
      position: relative;
      aspect-ratio: 3/4;
      background: var(--gray-100);
      overflow: hidden;
    }
    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* 썸네일 없을 때 기본 표지 */
    .card-cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #2d0a12 0%, var(--black) 100%);
      color: var(--white);
      padding: 24px;
      text-align: center;
    }
    .card-cover-placeholder svg {
      opacity: .3;
      margin-bottom: 16px;
    }
    .card-cover-placeholder-title {
      font-family: 'Merriweather', serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      color: rgba(255,255,255,.85);
      word-break: keep-all;
    }

    /* 잠금 오버레이 */
    .card-lock {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      backdrop-filter: blur(2px);
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover .card-lock { opacity: 1; }
    .card-lock-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-lock-text {
      font-size: 13px;
      color: rgba(255,255,255,.9);
      font-weight: 500;
    }

    /* 열람 가능 오버레이 (hover) */
    .card-open-overlay {
      position: absolute;
      inset: 0;
      background: rgba(165,28,48,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .25s;
    }
    .card:hover .card-open-overlay { opacity: 1; }
    .card-open-label {
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-body {
      padding: 16px;
    }
    .card-title {
      font-family: 'Merriweather', serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--black);
      margin-bottom: 6px;
      word-break: keep-all;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc {
      font-size: 12px;
      color: var(--gray-500);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-pages {
      font-size: 11px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #f0f0f0;
      color: var(--gray-500);
    }
    .card-badge.member { background: #e8f4e8; color: #2d7a2d; }

    /* 로딩 스켈레톤 */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray-500);
    }
    .empty svg { opacity: .3; margin-bottom: 20px; }
    .empty h3 { font-size: 18px; margin-bottom: 8px; color: var(--gray-700); }
    .empty p { font-size: 14px; }

    /* ── 팝업 (권한 없음) ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: modalIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(.88) translateY(20px); } }
    .modal-icon {
      width: 72px;
      height: 72px;
      background: #fff0f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .modal h3 {
      font-family: 'Merriweather', serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--black);
    }
    .modal p {
      font-size: 14px;
      color: var(--gray-700);
      line-height: 1.7;
      margin-bottom: 28px;
      word-break: keep-all;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: center; }
    .btn-primary {
      background: var(--crimson);
      color: var(--white);
      border: none;
      padding: 11px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
      font-family: inherit;
    }
    .btn-primary:hover { background: var(--crimson-dark); }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: none;
      padding: 11px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      font-family: inherit;
    }
    .btn-secondary:hover { background: var(--gray-300); }

    /* 관리자 배지 */
    .admin-badge-cover {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,.7);
      color: rgba(255,255,255,.9);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: .5px;
    }

    @media (max-width: 600px) {
      .hero { min-height: 320px; padding: 50px 20px; }
      .hero h1 { font-size: 1.8rem; }
      .main { padding: 32px 16px 60px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
      .header-inner { padding: 14px 20px; }
      .header-logo-main { font-size: 1.5rem; }
      .header-nav a, .btn-logout { font-size: .8rem; padding: 6px 10px; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-logo">
      <div class="header-logo-main">BDS</div>
      <div class="header-logo-sub">Beyond Dream Scholars</div>
    </a>
    <nav class="header-nav">
      <a href="index.html">홈</a>
      <a href="library.html" class="active">자료실</a>
      <a href="dashboard.html" id="headerDashLink" style="display:none;">포털</a>
      <button class="btn-logout" id="headerLogout" style="display:none;">로그아웃</button>
      <a href="auth.html" id="headerLogin">로그인</a>
    </nav>
  </div>
</header>

<!-- 히어로 -->
<section class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">BDS Library</p>
    <h1>BDS 자료실</h1>
    <p>주간 뉴스레터, 국내/해외 스페셜 활동, 체험학습, Year Book 등 주요 자료를 전자책으로 열람하세요.</p>
  </div>
</section>

<!-- 본문 -->
<main class="main">
  <div class="toolbar">
    <div class="toolbar-title">
      전체 자료 <span id="totalCount"></span>
    </div>
    <button class="btn-upload" id="btnUpload" style="display:none;" onclick="openUploadModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      새 자료 업로드
    </button>
  </div>

  <div class="grid" id="grid">
    <!-- 스켈레톤 -->
    <div class="card"><div class="card-cover skeleton"></div><div class="card-body"><div class="skeleton" style="height:16px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:60%;"></div></div></div>
    <div class="card"><div class="card-cover skeleton"></div><div class="card-body"><div class="skeleton" style="height:16px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:60%;"></div></div></div>
    <div class="card"><div class="card-cover skeleton"></div><div class="card-body"><div class="skeleton" style="height:16px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:60%;"></div></div></div>
  </div>
</main>

<!-- 권한 없음 팝업 -->
<div class="modal-backdrop" id="lockModal">
  <div class="modal">
    <div class="modal-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#A51C30" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h3>열람 권한이 필요합니다</h3>
    <p>이 자료는 회원 로그인 후 열람할 수 있습니다.<br>계정이 없으신 경우 회원가입을 진행해주세요.</p>
    <div class="modal-actions">
      <a href="auth.html?next=library.html" class="btn-primary" id="lockModalLoginBtn">로그인하기</a>
      <button class="btn-secondary" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<!-- 업로드 모달 -->
<div class="modal-backdrop" id="uploadModal">
  <div class="modal" style="max-width:500px;text-align:left;">
    <h3 style="margin-bottom:20px;font-size:18px;">새 자료 업로드</h3>

    <div style="margin-bottom:14px;">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">PDF 파일 <span style="color:#A51C30;">*</span></label>
      <div id="dropzone" style="border:2px dashed #d0d0d0;border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:border-color .2s;" onclick="document.getElementById('pdfInput').click()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" style="margin-bottom:8px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p id="dropzoneText" style="font-size:13px;color:#888;">클릭하거나 PDF 파일을 여기에 드래그하세요</p>
        <p style="font-size:11px;color:#bbb;margin-top:4px;">최대 50MB</p>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none;" onchange="onPdfSelected(this)">
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">제목 <span style="color:#A51C30;">*</span></label>
      <input type="text" id="ebookTitle" placeholder="예: 2025 입학 안내서" style="width:100%;padding:10px 12px;border:1.5px solid #d0d0d0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;" />
    </div>

    <div style="margin-bottom:14px;">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">설명</label>
      <textarea id="ebookDesc" placeholder="자료에 대한 간단한 설명" rows="2" style="width:100%;padding:10px 12px;border:1.5px solid #d0d0d0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;resize:vertical;"></textarea>
    </div>

    <div style="margin-bottom:24px;">
      <label style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">열람 권한</label>
      <select id="ebookRole" style="width:100%;padding:10px 12px;border:1.5px solid #d0d0d0;border-radius:8px;font-size:14px;font-family:inherit;background:white;outline:none;">
        <option value="member">회원 전용</option>
        <option value="admin">관리자 전용</option>
      </select>
    </div>

    <!-- 업로드 진행 표시 -->
    <div id="uploadProgress" style="display:none;margin-bottom:16px;">
      <div style="font-size:13px;color:#666;margin-bottom:6px;" id="uploadProgressText">업로드 중...</div>
      <div style="background:#f0f0f0;border-radius:4px;height:6px;overflow:hidden;">
        <div id="uploadProgressBar" style="height:100%;background:#A51C30;width:0%;transition:width .3s;border-radius:4px;"></div>
      </div>
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn-secondary" onclick="closeUploadModal()">취소</button>
      <button class="btn-primary" id="btnUploadSubmit" onclick="submitUpload()">업로드</button>
    </div>
  </div>
</div>

<script>
  /* ── 초기화 ── */
  let ebooks = [];
  let isAdmin = false;

  async function init() {
    // 헤더 auth 상태
    if (BDS_AUTH.isLoggedIn()) {
      document.getElementById('headerLogin').style.display = 'none';
      document.getElementById('headerDashLink').style.display = '';
      document.getElementById('headerLogout').style.display = '';
      isAdmin = BDS_AUTH.isAdmin();
      if (isAdmin) document.getElementById('btnUpload').style.display = '';
    }

    document.getElementById('headerLogout').addEventListener('click', async () => {
      await BDS_AUTH.logout();
      location.reload();
    });

    await loadEbooks();
  }

  async function loadEbooks() {
    try {
      const res = await BDS_AUTH.authFetch('/api/ebooks');
      const data = await res.json();
      ebooks = data.ebooks || [];
      renderGrid(ebooks);
    } catch {
      document.getElementById('grid').innerHTML = `
        <div class="empty" style="grid-column:1/-1;">
          <p>자료를 불러오는 중 오류가 발생했습니다.</p>
        </div>`;
    }
  }

  function renderGrid(list) {
    const grid = document.getElementById('grid');
    const count = document.getElementById('totalCount');
    count.textContent = `(${list.length}건)`;

    if (!list.length) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <h3>등록된 자료가 없습니다</h3>
          <p>관리자가 자료를 업로드하면 이곳에 표시됩니다.</p>
        </div>`;
      return;
    }

    grid.innerHTML = list.map(b => buildCard(b)).join('');
  }

  function buildCard(book) {
    const thumbUrl = `/api/ebooks/${book.id}/thumbnail`;
    const coverHtml = book.thumbnail_key
      ? `<img src="${thumbUrl}" alt="${esc(book.title)}" loading="lazy" onerror="this.parentNode.innerHTML=placeholderCover('${esc(book.title)}')">`
      : `<div class="card-cover-placeholder">
           <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
           <div class="card-cover-placeholder-title">${esc(book.title)}</div>
         </div>`;

    const overlayHtml = book.canAccess
      ? `<div class="card-open-overlay"><span class="card-open-label">
           <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
           열람하기
         </span></div>`
      : `<div class="card-lock">
           <div class="card-lock-icon">
             <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
           </div>
           <span class="card-lock-text">열람 권한 필요</span>
         </div>`;

    const adminEdit = isAdmin
      ? `<span class="admin-badge-cover">관리</span>` : '';

    return `
      <div class="card" onclick="onCardClick('${book.id}', ${book.canAccess})">
        <div class="card-cover">
          ${coverHtml}
          ${overlayHtml}
          ${adminEdit}
        </div>
        <div class="card-body">
          <div class="card-title">${esc(book.title)}</div>
          ${book.description ? `<div class="card-desc">${esc(book.description)}</div>` : ''}
          <div class="card-meta">
            <span class="card-pages">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              ${book.total_pages > 0 ? book.total_pages + 'p' : '—'}
            </span>
            <span class="card-badge member">회원</span>
          </div>
        </div>
      </div>`;
  }

  function placeholderCover(title) {
    return `<div class="card-cover-placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <div class="card-cover-placeholder-title">${title}</div>
    </div>`;
  }

  function onCardClick(id, canAccess) {
    if (!BDS_AUTH.isLoggedIn()) {
      document.getElementById('lockModalLoginBtn').href = `auth.html?next=${encodeURIComponent('library.html')}`;
      document.getElementById('lockModal').classList.add('open');
      return;
    }
    if (!canAccess) {
      document.getElementById('lockModal').classList.add('open');
      return;
    }
    location.href = `viewer.html?id=${id}`;
  }

  function closeModal() {
    document.getElementById('lockModal').classList.remove('open');
  }

  // 배경 클릭으로 닫기
  document.getElementById('lockModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 업로드 모달 ── */
  let selectedPdfFile = null;
  let selectedEbookId = null;

  function openUploadModal() {
    selectedPdfFile = null;
    selectedEbookId = crypto.randomUUID();
    document.getElementById('ebookTitle').value = '';
    document.getElementById('ebookDesc').value = '';
    document.getElementById('ebookRole').value = 'member';
    document.getElementById('dropzoneText').textContent = '클릭하거나 PDF 파일을 여기에 드래그하세요';
    document.getElementById('dropzone').style.borderColor = '#d0d0d0';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('uploadModal').classList.add('open');
  }
  function closeUploadModal() {
    document.getElementById('uploadModal').classList.remove('open');
  }
  document.getElementById('uploadModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeUploadModal();
  });

  function onPdfSelected(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.type !== 'application/pdf') {
      alert('PDF 파일만 업로드할 수 있습니다.');
      return;
    }
    selectedPdfFile = file;
    document.getElementById('dropzoneText').textContent = `✓ ${file.name} (${(file.size/1024/1024).toFixed(1)}MB)`;
    document.getElementById('dropzone').style.borderColor = '#A51C30';
  }

  // 드래그&드롭
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='#A51C30'; });
  dz.addEventListener('dragleave', () => dz.style.borderColor='#d0d0d0');
  dz.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      document.getElementById('pdfInput').files = dt.files;
      onPdfSelected(document.getElementById('pdfInput'));
    }
  });

  async function submitUpload() {
    if (!selectedPdfFile) { alert('PDF 파일을 선택해주세요.'); return; }
    const title = document.getElementById('ebookTitle').value.trim();
    if (!title) { alert('제목을 입력해주세요.'); return; }

    const btn = document.getElementById('btnUploadSubmit');
    btn.disabled = true;
    btn.textContent = '업로드 중...';

    const progress = document.getElementById('uploadProgress');
    const progressText = document.getElementById('uploadProgressText');
    const progressBar = document.getElementById('uploadProgressBar');
    progress.style.display = 'block';

    try {
      // 1. PDF.js로 페이지 수 및 썸네일 추출
      progressText.textContent = 'PDF 분석 중...';
      progressBar.style.width = '10%';

      const pdfjsLib = window['pdfjs-dist/build/pdf'];
      let totalPages = 0;
      let thumbnailBlob = null;

      if (pdfjsLib) {
        const arrayBuffer = await selectedPdfFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        totalPages = pdf.numPages;

        // 첫 페이지 → 썸네일
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        thumbnailBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
        progressBar.style.width = '25%';
      }

      // 2. PDF 업로드
      // authFetch 대신 fetch 직접 사용 — 브라우저가 multipart boundary를 자동 설정하게 함
      progressText.textContent = 'PDF 업로드 중...';
      const pdfForm = new FormData();
      pdfForm.append('file', selectedPdfFile);
      pdfForm.append('type', 'pdf');
      pdfForm.append('ebook_id', selectedEbookId);

      const pdfRes = await fetch('/api/ebooks/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${BDS_AUTH.getToken()}` },
        body: pdfForm,
      });
      if (!pdfRes.ok) {
        let errMsg = 'PDF 업로드 실패';
        try { const d = await pdfRes.json(); errMsg = d.error || errMsg; } catch {}
        throw new Error(errMsg);
      }
      const { key: r2Key } = await pdfRes.json();
      progressBar.style.width = '65%';

      // 3. 썸네일 업로드 (있는 경우)
      let thumbnailKey = null;
      if (thumbnailBlob) {
        progressText.textContent = '표지 이미지 생성 중...';
        const thumbForm = new FormData();
        thumbForm.append('file', new File([thumbnailBlob], 'thumbnail.jpg', { type: 'image/jpeg' }));
        thumbForm.append('type', 'thumbnail');
        thumbForm.append('ebook_id', selectedEbookId);

        const thumbRes = await fetch('/api/ebooks/upload', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${BDS_AUTH.getToken()}` },
          body: thumbForm,
        });
        if (thumbRes.ok) {
          const d = await thumbRes.json();
          thumbnailKey = d.key;
        }
        progressBar.style.width = '85%';
      }

      // 4. 메타데이터 등록
      progressText.textContent = '등록 완료 처리 중...';
      const metaRes = await BDS_AUTH.authFetch('/api/ebooks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title,
          description: document.getElementById('ebookDesc').value.trim() || null,
          r2_key: r2Key,
          thumbnail_key: thumbnailKey,
          total_pages: totalPages,
          required_role: document.getElementById('ebookRole').value,
        }),
      });
      if (!metaRes.ok) throw new Error('메타데이터 등록 실패');

      progressBar.style.width = '100%';
      progressText.textContent = '업로드 완료!';

      setTimeout(() => {
        closeUploadModal();
        loadEbooks();
      }, 800);

    } catch (e) {
      alert('업로드 중 오류가 발생했습니다: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = '업로드';
    }
  }

  init();
</script>

<!-- PDF.js (썸네일 추출용) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  if (window['pdfjs-dist/build/pdf']) {
    window['pdfjs-dist/build/pdf'].GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
</script>
</body>
