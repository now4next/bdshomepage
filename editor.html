<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>글 편집기 — BDS 관리자</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="js/auth-client.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --crimson:#A51C30; --crimson-dark:#8a1828; --black:#1a1a1a; --gray-50:#f9f9f9; --gray-100:#f0f0f0; --border:#e0e0e0; --white:#fff; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--black); font-size: 14px; }

    /* ── 상단바 ── */
    .topbar { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top:0; z-index: 200; gap: 12px; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .breadcrumb { font-size: .82rem; color: #888; }
    .breadcrumb a { color: var(--crimson); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .post-status { font-size: .75rem; font-weight: 600; padding: 3px 9px; }
    .status-draft     { background: #fff3e0; color: #e65100; }
    .status-published { background: #e8f5e9; color: #2e7d32; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; font-size: .83rem; font-weight: 500; font-family: inherit; border: 1px solid var(--border); background: var(--white); cursor: pointer; color: var(--black); transition: all .2s; }
    .btn:hover { background: var(--gray-50); border-color: var(--black); }
    .btn-primary { background: var(--crimson); color: var(--white); border-color: var(--crimson); }
    .btn-primary:hover { background: var(--crimson-dark); }
    .btn-outline { background: var(--white); color: var(--crimson); border-color: var(--crimson); }
    .btn-outline:hover { background: rgba(165,28,48,.06); }
    .btn:disabled { opacity: .4; cursor: default; }

    /* ── 레이아웃 ── */
    .editor-layout { display: grid; grid-template-columns: 1fr 280px; gap: 0; min-height: calc(100vh - 56px); }
    .editor-main   { padding: 28px 32px; border-right: 1px solid var(--border); }
    .editor-side   { padding: 24px 20px; background: var(--white); overflow-y: auto; }

    /* ── 제목 입력 ── */
    .title-input { width: 100%; font-family: 'Merriweather', serif; font-size: 1.8rem; font-weight: 900; border: none; outline: none; background: transparent; color: var(--black); padding: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 14px; }
    .title-input::placeholder { color: #ccc; }
    .title-input:focus { border-bottom-color: var(--crimson); }

    /* ── 에디터 툴바 ── */
    .editor-toolbar { display: flex; align-items: center; gap: 2px; padding: 8px 10px; background: var(--gray-50); border: 1px solid var(--border); border-bottom: none; flex-wrap: wrap; }
    .tool-btn { background: none; border: none; cursor: pointer; padding: 5px 8px; font-size: .82rem; font-family: inherit; color: var(--black); border-radius: 4px; transition: background .15s; display: flex; align-items: center; gap: 3px; }
    .tool-btn:hover { background: var(--gray-100); }
    .tool-btn.active { background: var(--crimson); color: var(--white); }
    .tool-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
    .tool-select { font-size: .8rem; border: 1px solid var(--border); padding: 4px 6px; background: var(--white); font-family: inherit; cursor: pointer; border-radius: 4px; }

    /* ── 에디터 본문 ── */
    .editor-content {
      min-height: 480px; padding: 20px; border: 1px solid var(--border);
      background: var(--white); outline: none; line-height: 1.85; font-size: .96rem;
      color: #333;
    }
    .editor-content:focus { border-color: var(--crimson); box-shadow: 0 0 0 2px rgba(165,28,48,.08); }
    .editor-content h1 { font-family: 'Merriweather', serif; font-size: 1.6rem; margin: 1.8em 0 .6em; }
    .editor-content h2 { font-family: 'Merriweather', serif; font-size: 1.3rem; margin: 1.6em 0 .5em; padding-bottom: 6px; border-bottom: 2px solid #f0f0f0; }
    .editor-content h3 { font-family: 'Merriweather', serif; font-size: 1.1rem; margin: 1.4em 0 .4em; }
    .editor-content p  { margin-bottom: 1.2em; }
    .editor-content ul, .editor-content ol { margin: .8em 0 1.2em 1.6em; }
    .editor-content li { margin-bottom: .4em; }
    .editor-content blockquote { border-left: 4px solid var(--crimson); padding: .8em 1.2em; margin: 1.2em 0; background: #fafafa; font-style: italic; color: #555; }
    .editor-content img { max-width: 100%; border-radius: 4px; margin: 1em 0; display: block; cursor: pointer; }
    .editor-content a { color: var(--crimson); }
    .editor-content [data-placeholder]:empty::before { content: attr(data-placeholder); color: #bbb; pointer-events: none; }

    /* ── 사이드바 필드 ── */
    .side-section { margin-bottom: 24px; }
    .side-label { font-size: .72rem; font-weight: 600; color: #888; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .side-input, .side-select, .side-textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border);
      font-family: inherit; font-size: .85rem; color: var(--black); background: var(--white);
    }
    .side-input:focus, .side-select:focus, .side-textarea:focus { outline: none; border-color: var(--crimson); }
    .side-textarea { resize: vertical; min-height: 80px; }

    /* 썸네일 업로드 */
    .thumb-zone { border: 2px dashed var(--border); padding: 16px; text-align: center; cursor: pointer; transition: border-color .2s; background: var(--gray-50); }
    .thumb-zone:hover { border-color: var(--crimson); }
    .thumb-preview { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; margin-bottom: 8px; border-radius: 4px; }
    .thumb-hint { font-size: .75rem; color: #aaa; margin-top: 4px; }
    .thumb-remove { font-size: .75rem; color: var(--crimson); cursor: pointer; text-decoration: underline; display: none; margin-top: 6px; }

    /* 발행 토글 */
    .publish-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
    .publish-label { font-size: .88rem; font-weight: 500; }
    .toggle-wrap { position: relative; width: 40px; height: 22px; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 22px; cursor: pointer; transition: background .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; background: var(--white); border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
    .toggle-wrap input:checked + .toggle-slider { background: var(--crimson); }
    .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* 알림 */
    .alert { padding: 9px 14px; font-size: .83rem; margin-bottom: 12px; display: none; }
    .alert.show { display: block; }
    .alert-ok  { background: #e8f5e9; color: #2e7d32; }
    .alert-err { background: rgba(198,40,40,.07); color: #c62828; }

    @media (max-width: 860px) {
      .editor-layout { grid-template-columns: 1fr; }
      .editor-side { border-top: 1px solid var(--border); }
      .editor-main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- 상단바 -->
<div class="topbar">
  <div class="topbar-left">
    <div class="breadcrumb">
      <a href="dashboard.html">대시보드</a> › <a href="#" onclick="location.href='dashboard.html'">글 관리</a> › 편집
    </div>
    <span class="post-status status-draft" id="statusBadge">초안</span>
  </div>
  <div class="topbar-actions">
    <div class="alert alert-ok" id="alertOk" style="margin:0;padding:6px 12px;">저장되었습니다.</div>
    <div class="alert alert-err" id="alertErr" style="margin:0;padding:6px 12px;"></div>
    <button class="btn" onclick="saveDraft()" id="btnDraft">초안 저장</button>
    <button class="btn btn-primary" onclick="saveAndPublish()" id="btnPublish">발행</button>
    <button class="btn" onclick="location.href='dashboard.html'">← 나가기</button>
  </div>
</div>

<!-- 에디터 레이아웃 -->
<div class="editor-layout">
  <!-- 메인 에디터 -->
  <div class="editor-main">
    <input type="text" id="postTitle" class="title-input" placeholder="제목을 입력하세요..." maxlength="200" />

    <!-- 툴바 -->
    <div class="editor-toolbar">
      <select class="tool-select" id="blockFormat" onchange="applyBlock(this.value)">
        <option value="p">본문</option>
        <option value="h1">제목1</option>
        <option value="h2">제목2</option>
        <option value="h3">제목3</option>
        <option value="blockquote">인용</option>
        <option value="pre">코드</option>
      </select>
      <div class="tool-sep"></div>
      <button class="tool-btn" title="굵게 (Ctrl+B)" onclick="fmt('bold')"><b>B</b></button>
      <button class="tool-btn" title="기울임 (Ctrl+I)" onclick="fmt('italic')"><i>I</i></button>
      <button class="tool-btn" title="밑줄 (Ctrl+U)" onclick="fmt('underline')"><u>U</u></button>
      <button class="tool-btn" title="취소선" onclick="fmt('strikeThrough')"><s>S</s></button>
      <div class="tool-sep"></div>
      <button class="tool-btn" title="불릿 목록" onclick="fmt('insertUnorderedList')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" title="번호 목록" onclick="fmt('insertOrderedList')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" title="링크 삽입" onclick="insertLink()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      </button>
      <button class="tool-btn" title="구분선" onclick="insertHR()">—</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" title="이미지 삽입" onclick="document.getElementById('imgInput').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        이미지
      </button>
      <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="insertImage(this)" />
      <div class="tool-sep"></div>
      <button class="tool-btn" title="실행 취소 (Ctrl+Z)" onclick="fmt('undo')">↩</button>
      <button class="tool-btn" title="다시 실행 (Ctrl+Y)" onclick="fmt('redo')">↪</button>
    </div>

    <!-- 에디터 본문 -->
    <div id="editor" class="editor-content" contenteditable="true"
         data-placeholder="내용을 입력하세요... 툴바를 이용해 서식을 지정하거나 이미지를 삽입할 수 있습니다."
         spellcheck="false"></div>
  </div>

  <!-- 사이드바 -->
  <div class="editor-side">

    <div class="side-section">
      <div class="side-label">발행 상태</div>
      <div class="publish-row">
        <span class="publish-label" id="publishLabel">초안</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="togglePublish" onchange="onPublishToggle()" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="side-section">
      <div class="side-label">카테고리</div>
      <select id="postCategory" class="side-select">
        <option value="news">소식</option>
        <option value="event">이벤트</option>
        <option value="knowledge">지식정보</option>
      </select>
    </div>

    <div class="side-section">
      <div class="side-label">썸네일 이미지</div>
      <div class="thumb-zone" id="thumbZone" onclick="document.getElementById('thumbInput').click()">
        <img id="thumbPreview" class="thumb-preview" src="" alt="" style="display:none;" />
        <svg id="thumbIcon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <div class="thumb-hint">클릭하여 썸네일 업로드<br>(JPG/PNG, 10MB 이하)</div>
      </div>
      <span class="thumb-remove" id="thumbRemove" onclick="removeThumbnail()">✕ 썸네일 제거</span>
      <input type="file" id="thumbInput" accept="image/*" style="display:none" onchange="uploadThumbnail(this)" />
    </div>

    <div class="side-section">
      <div class="side-label">미리보기 텍스트 (선택)</div>
      <textarea id="postExcerpt" class="side-textarea" placeholder="목록에서 보여줄 간단한 설명..."></textarea>
    </div>

    <div class="side-section" id="deleteSection" style="display:none;">
      <div class="side-label">위험 구역</div>
      <button class="btn" style="width:100%;color:#c62828;border-color:#c62828;" onclick="deletePost()">이 글 삭제</button>
    </div>
  </div>
</div>

<script>
  // 관리자 인증 체크
  if (!BDS_AUTH.requireLogin()) throw new Error('not logged in');
  const user = BDS_AUTH.getUser();
  if (user.role !== 'admin') { alert('관리자 권한이 필요합니다.'); location.href = 'dashboard.html'; }

  const postId = new URLSearchParams(location.search).get('id');
  let thumbnailKey = null;
  let isPublished  = false;
  let isSaving     = false;

  /* ── 기존 게시물 로드 ── */
  if (postId) {
    document.getElementById('deleteSection').style.display = '';
    loadExistingPost();
  }

  async function loadExistingPost() {
    try {
      const res  = await BDS_AUTH.authFetch(`/api/posts/${postId}`);
      if (!res.ok) throw new Error('불러오기 실패');
      const post = await res.json();

      document.getElementById('postTitle').value     = post.title;
      document.getElementById('editor').innerHTML    = post.content || '';
      document.getElementById('postExcerpt').value   = post.excerpt || '';
      document.getElementById('postCategory').value  = post.category;
      isPublished = !!post.is_published;
      thumbnailKey = post.thumbnail_key || null;

      if (post.thumbnail_key) {
        document.getElementById('thumbPreview').src  = `/api/media/${post.thumbnail_key}`;
        document.getElementById('thumbPreview').style.display = 'block';
        document.getElementById('thumbIcon').style.display    = 'none';
        document.getElementById('thumbRemove').style.display  = 'block';
      }

      updatePublishUI();
    } catch (e) {
      showAlert('err', '게시물 로드 실패: ' + e.message);
    }
  }

  /* ── 발행 토글 ── */
  function onPublishToggle() {
    isPublished = document.getElementById('togglePublish').checked;
    updatePublishUI();
  }
  function updatePublishUI() {
    document.getElementById('togglePublish').checked = isPublished;
    document.getElementById('publishLabel').textContent = isPublished ? '발행됨' : '초안';
    document.getElementById('statusBadge').textContent  = isPublished ? '발행됨' : '초안';
    document.getElementById('statusBadge').className = isPublished ? 'post-status status-published' : 'post-status status-draft';
    document.getElementById('btnPublish').textContent = isPublished ? '저장' : '발행';
  }

  /* ── 에디터 포맷 명령 ── */
  function fmt(cmd) { document.getElementById('editor').focus(); document.execCommand(cmd, false, null); }

  function applyBlock(tag) {
    document.getElementById('editor').focus();
    document.execCommand('formatBlock', false, tag);
  }

  function insertLink() {
    const url = prompt('링크 URL을 입력하세요:');
    if (!url) return;
    document.getElementById('editor').focus();
    document.execCommand('createLink', false, url);
    // 새 탭에서 열기
    const sel = window.getSelection();
    if (sel.anchorNode?.parentElement?.tagName === 'A') {
      sel.anchorNode.parentElement.target = '_blank';
      sel.anchorNode.parentElement.rel = 'noopener';
    }
  }

  function insertHR() {
    document.getElementById('editor').focus();
    document.execCommand('insertHTML', false, '<hr/><p></p>');
  }

  /* ── 콘텐츠 이미지 업로드 ── */
  async function insertImage(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    const tmpId = postId || crypto.randomUUID();
    const form  = new FormData();
    form.append('file', file);
    form.append('prefix', 'posts');
    form.append('id', tmpId);

    const res = await fetch('/api/media/upload', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${BDS_AUTH.getToken()}` },
      body: form,
    });
    if (!res.ok) { alert('이미지 업로드 실패'); return; }
    const { key } = await res.json();

    document.getElementById('editor').focus();
    document.execCommand('insertHTML', false,
      `<img src="/api/media/${key}" alt="" style="max-width:100%;" /><p></p>`);
  }

  /* ── 썸네일 업로드 ── */
  async function uploadThumbnail(input) {
    const file = input.files[0];
    if (!file) return;
    input.value = '';

    const tmpId = postId || crypto.randomUUID();
    const form  = new FormData();
    form.append('file', file);
    form.append('prefix', 'posts');
    form.append('id', tmpId + '-thumb');

    const res = await fetch('/api/media/upload', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${BDS_AUTH.getToken()}` },
      body: form,
    });
    if (!res.ok) { alert('썸네일 업로드 실패'); return; }
    const { key } = await res.json();

    thumbnailKey = key;
    document.getElementById('thumbPreview').src = `/api/media/${key}`;
    document.getElementById('thumbPreview').style.display = 'block';
    document.getElementById('thumbIcon').style.display    = 'none';
    document.getElementById('thumbRemove').style.display  = 'block';
  }

  function removeThumbnail() {
    thumbnailKey = null;
    document.getElementById('thumbPreview').style.display = 'none';
    document.getElementById('thumbIcon').style.display    = 'block';
    document.getElementById('thumbRemove').style.display  = 'none';
    document.getElementById('thumbInput').value = '';
  }

  /* ── 저장 ── */
  async function save(publish) {
    if (isSaving) return;
    isSaving = true;
    const btns = document.querySelectorAll('.topbar-actions .btn');
    btns.forEach(b => b.disabled = true);

    const title   = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('editor').innerHTML;
    const excerpt = document.getElementById('postExcerpt').value.trim();
    const category= document.getElementById('postCategory').value;

    if (!title) { showAlert('err', '제목을 입력해주세요.'); isSaving = false; btns.forEach(b => b.disabled = false); return; }

    const isPublishedFinal = publish ?? isPublished;
    const body = { title, content, excerpt: excerpt || null, thumbnail_key: thumbnailKey, category, is_published: isPublishedFinal ? 1 : 0 };

    try {
      let res, id = postId;
      if (postId) {
        res = await BDS_AUTH.authFetch(`/api/posts/${postId}`, { method: 'PATCH', body });
      } else {
        res = await BDS_AUTH.authFetch('/api/posts', { method: 'POST', body });
        if (res.ok) {
          const d = await res.json();
          id = d.id;
          history.replaceState(null, '', `editor.html?id=${id}`);
          document.getElementById('deleteSection').style.display = '';
        }
      }
      if (!res.ok) { const d = await res.json(); throw new Error(d.error || '저장 실패'); }

      isPublished = isPublishedFinal;
      updatePublishUI();
      showAlert('ok', isPublished ? '게시물이 발행되었습니다.' : '초안으로 저장되었습니다.');
    } catch (e) {
      showAlert('err', e.message);
    } finally {
      isSaving = false;
      btns.forEach(b => b.disabled = false);
    }
  }

  function saveDraft()        { save(false); }
  function saveAndPublish()   { save(isPublished || true); }

  /* ── 삭제 ── */
  async function deletePost() {
    if (!postId) return;
    if (!confirm('이 게시물을 삭제하시겠습니까? 복구할 수 없습니다.')) return;
    const res = await BDS_AUTH.authFetch(`/api/posts/${postId}`, { method: 'DELETE' });
    if (res.ok) { location.href = 'dashboard.html'; }
    else { alert('삭제 실패'); }
  }

  /* ── 알림 ── */
  function showAlert(type, msg) {
    const ok  = document.getElementById('alertOk');
    const err = document.getElementById('alertErr');
    ok.classList.remove('show'); err.classList.remove('show');
    if (type === 'ok') { ok.textContent = msg; ok.classList.add('show'); setTimeout(() => ok.classList.remove('show'), 2500); }
    else               { err.textContent = msg; err.classList.add('show'); setTimeout(() => err.classList.remove('show'), 3500); }
  }

  /* ── 블록 포맷 셀렉트 동기화 ── */
  document.getElementById('editor').addEventListener('keyup', syncBlockSelect);
  document.getElementById('editor').addEventListener('mouseup', syncBlockSelect);
  function syncBlockSelect() {
    const tag = document.queryCommandValue('formatBlock').toLowerCase();
    const sel = document.getElementById('blockFormat');
    const opt = [...sel.options].find(o => o.value === tag);
    if (opt) sel.value = tag;
    else sel.value = 'p';
  }

  /* ── Ctrl+S 저장 ── */
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveDraft(); }
  });
</script>
</body>
</html>
