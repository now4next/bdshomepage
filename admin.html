<!--
  BDS Admin — Submissions Viewer
  ================================
  인증: Cloudflare D1 + 세션 토큰 (js/auth-client.js)
  데이터: /api/contacts (Cloudflare Pages Functions + D1)
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>BDS 관리자 — 문의 현황</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
  <style>
    :root {
      --crimson: #A51C30;
      --crimson-dark: #8a1627;
      --black: #1a1a1a;
      --gray: #4a4a4a;
      --light-gray: #f5f5f5;
      --border: #e0e0e0;
      --success: #2e7d32;
      --warning: #b26a00;
      --error: #c62828;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', 'Pretendard Variable', Pretendard, 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--light-gray);
      color: var(--black);
      line-height: 1.5;
      font-size: 14px;
    }
    a { color: var(--crimson); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    .admin-header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .admin-brand { display: flex; align-items: baseline; gap: 12px; }
    .admin-brand-main { font-family: 'Merriweather', serif; font-size: 1.4rem; color: var(--crimson); font-weight: 700; }
    .admin-brand-sub  { font-size: 0.8rem; color: var(--gray); letter-spacing: 0.05em; }
    .admin-header-actions { display: flex; gap: 8px; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; font-size: 0.85rem; font-weight: 500;
      border-radius: 3px; cursor: pointer; transition: all 0.15s ease;
      border: 1px solid transparent; background: none; color: inherit; font-family: inherit;
    }
    .btn-primary { background: var(--crimson); color: #fff; border-color: var(--crimson); }
    .btn-primary:hover { background: var(--crimson-dark); border-color: var(--crimson-dark); }
    .btn-ghost { background: #fff; color: var(--black); border-color: var(--border); }
    .btn-ghost:hover { background: var(--light-gray); border-color: var(--black); }
    .btn-danger { color: var(--error); border-color: transparent; }
    .btn-danger:hover { background: rgba(198,40,40,0.08); }

    /* Login view */
    .login-wrap {
      min-height: calc(100vh - 60px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      background: #fff; border: 1px solid var(--border);
      padding: 40px 36px; width: 100%; max-width: 380px;
      border-radius: 4px; box-shadow: 0 4px 18px rgba(0,0,0,0.04);
    }
    .login-card h1 { font-family: 'Merriweather', serif; font-size: 1.4rem; margin-bottom: 6px; color: var(--black); }
    .login-card .sub { font-size: 0.85rem; color: var(--gray); margin-bottom: 28px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--gray); margin-bottom: 6px; }
    .form-row input {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 3px; font-size: 0.9rem; font-family: inherit;
      color: var(--black); transition: border-color 0.15s ease;
    }
    .form-row input:focus { outline: none; border-color: var(--crimson); }
    .login-error {
      background: rgba(198,40,40,0.08); color: var(--error);
      font-size: 0.8rem; padding: 10px 12px; border-radius: 3px;
      margin-bottom: 16px; display: none;
    }
    .login-error.active { display: block; }
    .login-submit { width: 100%; padding: 11px; font-size: 0.9rem; font-weight: 600; margin-top: 8px; }

    /* Dashboard */
    .dashboard { max-width: 1400px; margin: 0 auto; padding: 28px; }
    .dashboard-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .dashboard-title { font-family: 'Merriweather', serif; font-size: 1.4rem; }
    .dashboard-meta  { color: var(--gray); font-size: 0.85rem; }
    .dashboard-actions { display: flex; gap: 8px; }

    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat { background: #fff; border: 1px solid var(--border); padding: 16px 18px; border-radius: 4px; }
    .stat-label { font-size: 0.75rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .stat-value { font-family: 'Merriweather', serif; font-size: 1.6rem; color: var(--black); }

    .notice {
      background: #e8f5e9; border-left: 3px solid var(--success);
      padding: 12px 16px; margin-bottom: 20px;
      font-size: 0.85rem; color: #1b5e20; border-radius: 0 3px 3px 0;
    }

    .submissions { background: #fff; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .empty { padding: 80px 28px; text-align: center; color: var(--gray); }
    .empty-icon { font-size: 2.5rem; opacity: 0.4; margin-bottom: 12px; }
    .empty h2 { font-family: 'Merriweather', serif; font-size: 1.1rem; color: var(--black); margin-bottom: 6px; }
    .empty p { font-size: 0.9rem; }

    .sub-row { border-bottom: 1px solid var(--border); padding: 20px 24px; transition: background 0.15s ease; }
    .sub-row:last-child { border-bottom: none; }
    .sub-row:hover { background: #fafafa; }
    .sub-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .sub-name { font-size: 1.05rem; font-weight: 600; color: var(--black); }
    .inquiry-tag {
      display: inline-block; margin-left: 8px; padding: 2px 8px;
      font-size: 0.72rem; font-weight: 500;
      background: var(--light-gray); color: var(--gray); border-radius: 3px; vertical-align: middle;
    }
    .sub-time { font-size: 0.8rem; color: var(--gray); white-space: nowrap; }
    .sub-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.72rem; padding: 2px 8px; border-radius: 3px; font-weight: 500; }
    .sub-badge.sent   { background: rgba(46,125,50,0.1); color: var(--success); }
    .sub-badge.failed { background: rgba(198,40,40,0.08); color: var(--error); }
    .sub-meta {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 4px 20px; font-size: 0.85rem; color: var(--gray); margin-bottom: 10px;
    }
    .sub-meta div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub-meta strong { color: var(--black); font-weight: 500; margin-right: 4px; }
    .sub-message {
      background: var(--light-gray); padding: 12px 14px; border-radius: 3px;
      font-size: 0.9rem; color: var(--black); white-space: pre-wrap; line-height: 1.6; margin-top: 10px;
    }
    .sub-actions { margin-top: 10px; display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="admin-header">
    <div class="admin-brand">
      <span class="admin-brand-main">BDS</span>
      <span class="admin-brand-sub">Admin Console</span>
    </div>
    <div class="admin-header-actions">
      <a href="dashboard.html" class="btn btn-ghost">회원 포털</a>
      <a href="index.html" class="btn btn-ghost">← 홈으로</a>
      <button type="button" class="btn btn-ghost" id="logoutBtn" style="display: none;">로그아웃</button>
    </div>
  </header>

  <!-- Login -->
  <main id="loginView" class="login-wrap">
    <div class="login-card">
      <h1>관리자 로그인</h1>
      <p class="sub">관리자 계정으로 로그인해 주세요.</p>
      <form id="loginForm" autocomplete="off">
        <div class="form-row">
          <label for="loginEmail">이메일</label>
          <input type="email" id="loginEmail" required placeholder="admin@bdskorea.org" autocomplete="username">
        </div>
        <div class="form-row">
          <label for="loginPassword">비밀번호</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary login-submit">로그인</button>
      </form>
    </div>
  </main>

  <!-- Dashboard (hidden until login) -->
  <main id="dashboardView" class="dashboard" style="display: none;">
    <div class="dashboard-top">
      <div>
        <div class="dashboard-title">문의 현황</div>
        <div class="dashboard-meta" id="dashMeta">— 건의 문의가 접수되었습니다.</div>
      </div>
      <div class="dashboard-actions">
        <button type="button" class="btn btn-ghost" id="refreshBtn">새로고침</button>
        <button type="button" class="btn btn-ghost" id="exportBtn">CSV 내보내기</button>
        <button type="button" class="btn btn-danger" id="clearBtn">전체 삭제 안내</button>
      </div>
    </div>

    <div class="notice">
      ✓ 문의 데이터는 <strong>Cloudflare D1 데이터베이스</strong>에 저장됩니다.
      모든 기기에서 동일한 데이터를 조회할 수 있습니다.
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-label">전체 문의</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat"><div class="stat-label">이메일 발송 완료</div><div class="stat-value" id="statSent">0</div></div>
      <div class="stat"><div class="stat-label">오늘 접수</div><div class="stat-value" id="statToday">0</div></div>
    </div>

    <div class="submissions" id="submissionsList"></div>
  </main>

  <script src="js/auth-client.js"></script>
  <script>
    const loginView     = document.getElementById('loginView');
    const dashboardView = document.getElementById('dashboardView');
    const logoutBtn     = document.getElementById('logoutBtn');
    const loginForm     = document.getElementById('loginForm');
    const loginError    = document.getElementById('loginError');

    function esc(str) {
      return String(str == null ? '' : str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function showDashboard() {
      loginView.style.display    = 'none';
      dashboardView.style.display = 'block';
      logoutBtn.style.display    = 'inline-flex';
      render();
    }

    function showLogin() {
      loginView.style.display    = 'flex';
      dashboardView.style.display = 'none';
      logoutBtn.style.display    = 'none';
    }

    // 로그인
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.remove('active');
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPassword').value;
      try {
        const user = await BDS_AUTH.login(email, pass);
        if (user.role !== 'admin') {
          await BDS_AUTH.logout();
          throw new Error('관리자 계정이 아닙니다. 일반 회원은 회원 포털을 이용해 주세요.');
        }
        showDashboard();
      } catch (err) {
        loginError.textContent = err.message;
        loginError.classList.add('active');
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await BDS_AUTH.logout();
      showLogin();
    });

    // 대시보드 렌더링
    async function render() {
      const list = document.getElementById('submissionsList');
      list.innerHTML = '<div class="empty"><p style="color:#aaa">불러오는 중…</p></div>';
      try {
        const res = await BDS_AUTH.authFetch('/api/contacts');
        if (res.status === 401 || res.status === 403) { await BDS_AUTH.logout(); showLogin(); return; }
        if (!res.ok) throw new Error('서버 오류 ' + res.status);

        const { submissions: subs } = await res.json();
        const total    = subs.length;
        const sent     = subs.filter(s => s.email_sent).length;
        const todayStr = new Date().toISOString().slice(0, 10);
        const today    = subs.filter(s => (s.created_at || '').startsWith(todayStr)).length;

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statSent').textContent  = sent;
        document.getElementById('statToday').textContent = today;
        document.getElementById('dashMeta').textContent  = `${total}건의 문의가 접수되었습니다.`;

        if (total === 0) {
          list.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📭</div>
              <h2>아직 접수된 문의가 없습니다</h2>
              <p>메인 페이지에서 문의 폼을 제출하면 이 곳에 표시됩니다.</p>
            </div>`;
          return;
        }

        list.innerHTML = subs.map(s => {
          const badge = s.email_sent
            ? '<span class="sub-badge sent">● 이메일 발송됨</span>'
            : '<span class="sub-badge failed">○ 이메일 실패</span>';
          return `
            <div class="sub-row">
              <div class="sub-head">
                <div>
                  <span class="sub-name">${esc(s.full_name)}</span>
                  <span class="inquiry-tag">${esc(s.inquiry_type || '')}</span>
                </div>
                <div style="display:flex;gap:10px;align-items:center;">
                  ${badge}
                  <span class="sub-time">${esc((s.created_at || '').slice(0,16))}</span>
                </div>
              </div>
              <div class="sub-meta">
                <div><strong>이메일</strong><a href="mailto:${esc(s.email)}">${esc(s.email)}</a></div>
                <div><strong>전화</strong>${esc(s.phone || '—')}</div>
                <div><strong>국가</strong>${esc(s.country || '미지정')}</div>
                <div><strong>학년</strong>${esc(s.grade_level || '—')}</div>
                <div><strong>선호 연락</strong>${esc(s.contact_method || '—')}</div>
              </div>
              ${s.message ? `<div class="sub-message">${esc(s.message)}</div>` : ''}
              <div class="sub-actions">
                <button type="button" class="btn btn-ghost"
                  data-email="${esc(s.email)}" data-name="${esc(s.full_name)}" data-type="${esc(s.inquiry_type||'')}">
                  답장 보내기
                </button>
              </div>
            </div>`;
        }).join('');

        list.querySelectorAll('[data-email]').forEach(btn => {
          btn.addEventListener('click', () => {
            const subject = encodeURIComponent(`[BDS] 문의 회신 — ${btn.dataset.type}`);
            const body    = encodeURIComponent(`안녕하세요 ${btn.dataset.name}님,\n\n문의 주셔서 감사합니다.\n\n`);
            location.href = `mailto:${btn.dataset.email}?subject=${subject}&body=${body}`;
          });
        });

      } catch (err) {
        list.innerHTML = `<div class="empty"><p style="color:var(--error)">오류: ${esc(err.message)}</p></div>`;
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', render);

    document.getElementById('exportBtn').addEventListener('click', async () => {
      try {
        const res = await BDS_AUTH.authFetch('/api/contacts');
        const { submissions: subs } = await res.json();
        if (!subs.length) { alert('내보낼 데이터가 없습니다.'); return; }
        const headers = ['created_at','full_name','email','phone','country','grade_level','inquiry_type','contact_method','message','email_sent'];
        const csvEsc = v => `"${String(v==null?'':v).replace(/"/g,'""')}"`;
        const rows = [headers.join(',')].concat(subs.map(s => headers.map(h => csvEsc(s[h])).join(',')));
        const blob = new Blob(['﻿' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement('a'), {
          href: url, download: `bds-contacts-${new Date().toISOString().slice(0,10)}.csv`
        });
        a.click(); URL.revokeObjectURL(url);
      } catch (e) { alert('CSV 내보내기 실패: ' + e.message); }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      alert('D1 데이터 삭제는\nCloudflare 대시보드 › D1 › bds-db\n에서 SQL로 직접 처리해 주세요.\n\nDELETE FROM contact_submissions;');
    });

    // Boot
    (async () => {
      if (BDS_AUTH.isLoggedIn() && BDS_AUTH.isAdmin()) {
        showDashboard();
      } else {
        if (BDS_AUTH.isLoggedIn()) await BDS_AUTH.logout();
        showLogin();
      }
    })();
  </script>
</body>
</html>
